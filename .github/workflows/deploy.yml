name: Deploy to GitHub Pages

# Builds the Astro site and deploys it via GitHub Pages (GitHub Actions source).
# configure-pages with enablement:true turns Pages on automatically on first run,
# so no manual Settings → Pages toggle is required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable + configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
